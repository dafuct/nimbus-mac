name: Release DMG

# Build a universal, ad-hoc-signed Nimbus.dmg and attach it to a GitHub Release
# whenever a version tag (v*) is pushed. Manual runs (workflow_dispatch) build the
# DMG as a downloadable workflow artifact without publishing a release.
#
#   git tag v1.0.0 && git push origin v1.0.0
#
# No secrets required — the app is ad-hoc signed (CODE_SIGN_IDENTITY "-"). A
# Developer-ID + notarized build needs a paid Apple account; see scripts/notarize.sh.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  dmg:
    name: Build & publish DMG
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Add x86_64 Rust target
        run: rustup target add x86_64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('rust/**/Cargo.lock', 'rust/**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Package universal DMG (ad-hoc signed)
        run: scripts/package-dmg.sh

      - name: Stage versioned artifact
        id: art
        run: |
          name="Nimbus-${GITHUB_REF_NAME}.dmg"
          cp build/Nimbus.dmg "$name"
          shasum -a 256 "$name" > "$name.sha256"
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.art.outputs.name }}
          path: |
            ${{ steps.art.outputs.name }}
            ${{ steps.art.outputs.name }}.sha256

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > notes.md <<'NOTES'
          Native macOS cleaner — universal build (Apple Silicon + Intel).

          ### Install
          1. Download the `.dmg` asset below.
          2. Open it and drag **Nimbus** to **Applications**.

          > ⚠️ This build is **ad-hoc signed** (no Apple Developer ID / notarization).
          > On first launch macOS Gatekeeper will warn — right-click the app →
          > **Open**, or allow it under **System Settings → Privacy & Security**.
          > A notarized build requires a paid Apple Developer account
          > (see `scripts/notarize.sh`).

          Verify the download with the attached `.sha256` file.
          NOTES
          gh release create "${GITHUB_REF_NAME}" \
            "${{ steps.art.outputs.name }}" \
            "${{ steps.art.outputs.name }}.sha256" \
            --repo "${{ github.repository }}" \
            --title "Nimbus ${GITHUB_REF_NAME}" \
            --notes-file notes.md
